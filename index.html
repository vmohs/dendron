<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding-top: 60px;
      font-family: Arial, sans-serif;
      background-image: url('dendron1.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      cursor: pointer;
      box-sizing: border-box;
    }

    img {
      width: 60%;
      max-width: 800px;
      min-width: 300px;
    }

    img + img {
      margin-top: -80px;
    }

    .click-prompt {
      margin-top: 2rem;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 14px;
      letter-spacing: 0.1em;
      opacity: 0.75;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body onclick="window.location.href='dedication.html'">

  <img src="title.png">
  <img src="author.png">
  <p class="click-prompt">click anywhere to proceed</p>

</body>
</html>
